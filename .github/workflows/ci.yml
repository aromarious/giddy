name: CI/CD

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

env:
  PNPM_VERSION: "9.15.0"

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.repository == 'aromarious/giddy-app'
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Sync runtime secrets to Workers
        run: doppler run --config prd -- sh -c 'doppler secrets download --no-file --format json --config prd | npx wrangler secret bulk --env production'

      - name: Apply D1 migrations
        run: doppler run --config prd -- npx wrangler d1 migrations apply giddy --remote --env production

      - name: Deploy Worker
        run: doppler run --config prd -- npx wrangler deploy --env production

      - name: Register Discord commands
        run: pnpm register-commands:prod

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
